services:
  backend:
    container_name: crater-spotter-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./.sqlite3:/backend/.sqlite3
      - ./public/storage:/backend/public/storage
  frontend:
    container_name: crater-spotter-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - ./nginx/certs/local.rsa.crt:/etc/nginx/certs/local.rsa.crt
      - ./nginx/certs/local.rsa.key:/etc/nginx/certs/local.rsa.key
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
