services:
  backend:
    container_name: crater-spotter-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      - HOST=0.0.0.0
    volumes:
      - ./.sqlite3:/backend/.sqlite3
      - ./public/storage:/backend/public/storage
  frontend:
    container_name: crater-spotter-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:8000"
    depends_on:
      - backend
